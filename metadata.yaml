name: astrbot_plugin_conversation_flow
display_name: 自然对话流
short_desc: 让 bot 像真人一样判断何时沉默/拒绝回应、智能分段回复、被插话时自然衔接
desc: >
  为 AstrBot 提供多维度对话流控制能力：
  1) 沉默/拒绝回应判断：在 LLM 请求前注入判断指令，让模型自主决定何时收口话题、何时对骚扰或不当言论保持沉默；
  2) 智能分段回复：通过提示词注入引导 LLM 主动用双空行分段，结果装饰阶段按双空行优先 + 句末标点（。！？!?）保底切分，模拟真人分段发送节奏；对完整段落/代码块保持原样；
  3) 插话中断处理：维护会话级 in-flight 状态，支持时间窗过滤和群聊中断作用域（room/sender/mention_or_sender）；实验性开关可在 bot 思考期间抑制旧结果并合并新旧公开上下文重新生成。当前不能取消 Provider 端推理，可能产生大量重复 Token 消耗。
  4) 群聊上下文注入：bot 在群聊中被@或回复时，自动获取最近若干条群聊消息作为背景上下文注入 LLM 请求，帮助 bot 理解群聊氛围。
  5) 结果所有权修复：不分段时直接 in-place 修改结果链，不调用 stop_event，避免与 TTS 等结果装饰插件冲突；分段发送失败时自动回退原始文本。
version: v0.3.1
author: Justice-ocr
author_desc: >
  AstrBot 插件开发者，关注对话自然度、消息节奏与人机交互真实感。
astrbot_version: ">=4.16.0,<5"
support_platforms:
  - aiocqhttp
repo: "https://github.com/qsbb/astrbot_plugin_conversation_flow"
homepage: "https://github.com/qsbb/astrbot_plugin_conversation_flow"
tags:
  - conversation
  - silence
  - chunking
  - interrupt
  - natural-reply
  - flow-control
license: "MIT"
disclaimer: >
  本插件通过指令注入与会话状态管理改变 bot 的回复节奏与时机，不改变 LLM 本身的能力。
  沉默/拒绝回应的判断由模型依据 prompt 自主完成，开发者不对模型具体判断结果承担责任。
  请合理配置 prompt，避免误伤正常对话或被恶意利用。
