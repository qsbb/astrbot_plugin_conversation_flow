name: astrbot_plugin_conversation_flow
display_name: 凝心溯溪-言
short_desc: 凝心溯溪系列对话模块：沉默判断、智能分段、插话衔接与群聊上下文
desc: >
  让 AstrBot 的回复节奏更接近真人聊天。通过提示词注入和结果装饰两阶段控制对话流，不改变 LLM 本身能力。

  核心能力：

  1) 沉默/拒绝回应判断：对"好的""嗯""hhhh"等无意义消息、骚扰攻击、话题终结符保持沉默，避免 bot 强行回复收不住话题。

  2) 智能分段回复：向 LLM 注入分段引导指令，让模型主动用双空行分段；结果装饰阶段按双空行优先 + 句末标点（。！？!?）保底切分，模拟真人分段发送节奏。代码块不被切分。

  3) 插话中断处理：bot 还在思考时用户追加消息，旧回复会被抑制或合并到新请求；支持群聊中断作用域（room/sender/mention_or_sender）和时间窗过滤。实验性开关可在思考期间抑制旧结果并合并重新生成（注意 Token 消耗）。

  4) 群聊上下文注入：bot 在群聊中被@或回复时，自动获取最近若干条群聊消息作为背景上下文注入 LLM 请求，帮助理解群聊氛围。

  5) 智能拦截：向主 LLM 注入拦截指令，让模型在主对话思维链中一并判断不良内容（色情/暴力/辱骂/违法/越狱等），命中则礼貌拒绝或静默。

  6) 纯文本模式：向 LLM 注入指令要求纯文本回复（不用 Markdown 格式），并在发送前剥离残留标记，代码块不受影响。

  7) 图片意图判断：检测到用户发送图片时，按对话作用（社交互动/观点态度/信息内容/话题收口）决定回复方向，卖萌撒娇不会被误判为无意义。
